<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gregorisa — Cocina</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060a0f;font-family:system-ui,sans-serif;color:#e2e8f0;min-height:100vh;}
.header{background:#0a0e14;border-bottom:1px solid #1e2d3d;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.h-title{font-size:14px;font-weight:700;color:#e2e8f0;}
.h-clock{font-size:20px;font-weight:700;color:#2D6A4F;font-variant-numeric:tabular-nums;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px;}
.stat{background:#111820;border:1px solid #1e2d3d;border-radius:8px;padding:10px;text-align:center;}
.stat-val{font-size:22px;font-weight:700;}
.stat-lbl{font-size:10px;color:#555;margin-top:2px;}
.alerta{background:#1a0505;border:1px solid #86efac;border-radius:8px;margin:0 12px 12px;padding:10px 14px;font-size:12px;color:#86efac;display:none;}
.comandas{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 12px;}
.comanda{border-radius:12px;padding:12px;border:1.5px solid;}
.c-urgente{background:#1a0505;border-color:#86efac;}
.c-warn{background:#1a1500;border-color:##B7E4C7;}
.c-ok{background:#051a0a;border-color:#34d399;}
.c-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.08);}
.c-num{font-size:13px;font-weight:700;color:#e2e8f0;}
.c-timer{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
.t-ok{color:#34d399;}.t-warn{color:##B7E4C7;}.t-late{color:#86efac;}
.c-cliente{font-size:11px;color:#555;margin-bottom:8px;}
.c-item{font-size:13px;color:#94a3b8;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.c-item:last-of-type{border-bottom:none;}
.c-nota{font-size:11px;color:#fb923c;margin-top:6px;padding:5px 8px;background:rgba(251,146,60,.1);border-radius:5px;}
.listo-btn{width:100%;background:#2D6A4F;color:#fff;font-size:13px;font-weight:700;padding:10px;border-radius:8px;border:none;cursor:pointer;margin-top:10px;}
.listo-btn:hover{opacity:.88;}
.empty-cocina{text-align:center;padding:60px 20px;color:#333;font-size:14px;}
.loading-txt{text-align:center;padding:40px;color:#333;font-size:13px;}
</style>
</head>
<body>
<div class="header">
  <div>
    <div class="h-title">🍳 Gregorisa · Cocina</div>
    <div style="font-size:10px;color:#555;margin-top:2px;">Comandas en tiempo real</div>
  </div>
  <div class="h-clock" id="clk">--:--:--</div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" style="color:#86efac" id="cnt-urgente">0</div><div class="stat-lbl">Urgentes</div></div>
  <div class="stat"><div class="stat-val" style="color:##B7E4C7" id="cnt-cocina">0</div><div class="stat-lbl">En preparación</div></div>
  <div class="stat"><div class="stat-val" style="color:#555" id="cnt-total">0</div><div class="stat-lbl">Entregados hoy</div></div>
</div>

<div class="alerta" id="alerta-urgente"></div>
<div class="comandas" id="comandas-grid"><div class="loading-txt">Cargando comandas...</div></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2.49.4'

const supabase = createClient(
  'https://rsebinhkyijetmfwnugl.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzZWJpbmhreWlqZXRtZndudWdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0Mzk1NzEsImV4cCI6MjA5MzAxNTU3MX0.C4WlOxrG6ilhDfaMkFhtfl_HxLRXC2Pkf4gcpGZTouE'
)

let pedidos = []

setInterval(() => {
  document.getElementById('clk').textContent =
    new Date().toLocaleTimeString('es-PE')
}, 1000)

function segsDesde(created_at) {
  return Math.floor((Date.now() - new Date(created_at).getTime()) / 1000)
}

function fmtTimer(segs) {
  const m = Math.floor(segs/60), s = segs%60
  return m + 'm ' + String(s).padStart(2,'0') + 's'
}

function tcls(segs) { return segs>=900?'t-late':segs>=480?'t-warn':'t-ok' }
function ccls(segs) { return segs>=900?'c-urgente':segs>=480?'c-warn':'c-ok' }

async function cargar() {
  const { data } = await supabase
    .from('pedidos')
    .select('*, pedido_items(*)')
    .in('estado', ['espera','cocina'])
    .order('created_at', { ascending: true })
  pedidos = data || []
  render()
}

function render() {
  const hoy = new Date().toISOString().split('T')[0]
  if (pedidos.length === 0) {
    document.getElementById('comandas-grid').innerHTML = '<div class="empty-cocina">✅ Sin comandas pendientes</div>'
    document.getElementById('cnt-urgente').textContent = '0'
    document.getElementById('cnt-cocina').textContent = '0'
    document.getElementById('alerta-urgente').style.display = 'none'
    return
  }

  let urgentes = 0
  document.getElementById('cnt-cocina').textContent = pedidos.length

  document.getElementById('comandas-grid').innerHTML = pedidos.map(p => {
    const segs = segsDesde(p.created_at)
    if (segs >= 900) urgentes++
    const items = p.pedido_items || []
    return `<div class="comanda ${ccls(segs)}">
      <div class="c-top">
        <span class="c-num">#${p.numero||'—'} · ${p.mesa||'—'}</span>
        <span class="c-timer ${tcls(segs)}">${fmtTimer(segs)}</span>
      </div>
      <div class="c-cliente">${p.cliente_nombre||'Cliente'}${p.estado==='espera'?' · ⏳ En espera':' · 🔥 Cocinando'}</div>
      ${items.map(i=>`<div class="c-item">${i.cantidad}x ${i.nombre}</div>`).join('')}
      ${p.nota?`<div class="c-nota">📝 ${p.nota}</div>`:''}
      <button class="listo-btn" onclick="marcarListo('${p.id}','${p.estado}')">
        ${p.estado==='espera'?'▶ Empezar':'✓ Marcar como LISTO'}
      </button>
    </div>`
  }).join('')

  document.getElementById('cnt-urgente').textContent = urgentes

  if (urgentes > 0) {
    const ur = pedidos.filter(p=>segsDesde(p.created_at)>=900)[0]
    document.getElementById('alerta-urgente').style.display = 'block'
    document.getElementById('alerta-urgente').textContent =
      `🚨 Pedido #${ur.numero} de ${ur.mesa} lleva más de 15 min — ¡Priorizar!`
  } else {
    document.getElementById('alerta-urgente').style.display = 'none'
  }
}

window.marcarListo = async (id, estadoActual) => {
  const nuevoEstado = estadoActual === 'espera' ? 'cocina' : 'listo'
  await supabase.from('pedidos').update({ estado: nuevoEstado }).eq('id', id)
  await cargar()
}

// Realtime
supabase.channel('cocina-live')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'pedidos' }, cargar)
  .subscribe()

// Actualizar timers cada segundo
setInterval(render, 1000)

cargar()
</script>
</body>
</html>
