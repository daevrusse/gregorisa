<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gregorisa — Ingresar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#111;font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:32px 24px;width:100%;max-width:360px;}
.logo{width:64px;height:64px;background:#2D6A4F;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;letter-spacing:-2px;margin:0 auto 16px;}
h1{font-size:20px;font-weight:700;color:#e2e8f0;text-align:center;margin-bottom:4px;}
.sub{font-size:12px;color:#555;text-align:center;margin-bottom:24px;}
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;color:#888;margin-bottom:5px;display:block;}
.form-input{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:11px 14px;font-size:14px;color:#e2e8f0;outline:none;font-family:inherit;transition:border-color .15s;}
.form-input:focus{border-color:#2D6A4F;}
.form-input::placeholder{color:#444;}
.login-btn{width:100%;background:#2D6A4F;color:#fff;font-size:14px;font-weight:700;padding:13px;border-radius:10px;border:none;cursor:pointer;margin-top:6px;transition:opacity .15s;}
.login-btn:hover{opacity:.88;}
.login-btn:disabled{opacity:.5;cursor:not-allowed;}
.error-box{background:#0a1f17;border:1px solid #1B4332;border-radius:8px;padding:10px 14px;font-size:12px;color:#86efac;margin-bottom:12px;display:none;}
.loading-box{background:#0e2030;border:1px solid #1e4060;border-radius:8px;padding:10px 14px;font-size:12px;color:#38bdf8;margin-bottom:12px;display:none;text-align:center;}
.role-info{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
.role-chip{flex:1;background:#111;border:0.5px solid #2a2a2a;border-radius:8px;padding:8px;text-align:center;min-width:80px;}
.role-icon{font-size:18px;display:block;margin-bottom:3px;}
.role-name{font-size:10px;color:#555;}
.divider{border:none;border-top:0.5px solid #2a2a2a;margin:20px 0;}
.version{font-size:10px;color:#333;text-align:center;margin-top:16px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">GR</div>
  <h1>Gregorisa</h1>
  <div class="sub">Cafetería de Especialidad</div>

  <div class="role-info">
    <div class="role-chip"><span class="role-icon">👑</span><span class="role-name">Admin</span></div>
    <div class="role-chip"><span class="role-icon">🧑‍🍳</span><span class="role-name">Mozo</span></div>
    <div class="role-chip"><span class="role-icon">👨‍🍳</span><span class="role-name">Cocina</span></div>
  </div>

  <div class="error-box" id="error-box"></div>
  <div class="loading-box" id="loading-box">Verificando credenciales...</div>

  <div class="form-group">
    <label class="form-label">Correo electrónico</label>
    <input class="form-input" type="email" id="email" placeholder="tu@email.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label class="form-label">Contraseña</label>
    <input class="form-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="login-btn" id="login-btn" onclick="doLogin()">Ingresar →</button>

  <div class="divider"></div>
  <div class="version">Gregorisa · v1.0 · 2025</div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabase = createClient(
  'https://https://rsebinhkyijetmfwnugl.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJzZWJpbmhreWlqZXRtZndudWdsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0Mzk1NzEsImV4cCI6MjA5MzAxNTU3MX0.C4WlOxrG6ilhDfaMkFhtfl_HxLRXC2Pkf4gcpGZTouE'
)

// Si ya hay sesión activa, redirigir directo
async function checkSession() {
  const { data: { session } } = await supabase.auth.getSession()
  if (session) {
    await redirigirPorRol(session.user.email)
  }
}

window.doLogin = async function() {
  const email    = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  const btn      = document.getElementById('login-btn')
  const errorBox = document.getElementById('error-box')
  const loadBox  = document.getElementById('loading-box')

  // Validar campos
  if (!email || !password) {
    mostrarError('Ingresa tu correo y contraseña.')
    return
  }

  // Mostrar cargando
  btn.disabled = true
  errorBox.style.display = 'none'
  loadBox.style.display = 'block'

  try {
    // Login con Supabase Auth
    const { data, error } = await supabase.auth.signInWithPassword({ email, password })

    if (error) {
      mostrarError('Correo o contraseña incorrectos. Intenta de nuevo.')
      return
    }

    // Buscar rol del usuario
    await redirigirPorRol(email)

  } catch(e) {
    mostrarError('Error de conexión. Verifica tu internet.')
  } finally {
    btn.disabled = false
    loadBox.style.display = 'none'
  }
}

async function redirigirPorRol(email) {
  const { data, error } = await supabase
    .from('usuarios')
    .select('rol, nombre, activo')
    .eq('email', email)
    .single()

  if (error || !data) {
    mostrarError('Usuario no encontrado en el sistema.')
    await supabase.auth.signOut()
    return
  }

  if (!data.activo) {
    mostrarError('Tu cuenta está desactivada. Contacta al administrador.')
    await supabase.auth.signOut()
    return
  }

  // Redirigir según rol
  const rutas = {
    admin:  '/admin.html',
    mozo:   '/mozo.html',
    cocina: '/cocina.html'
  }

  const destino = rutas[data.rol]
  if (destino) {
    window.location.href = destino
  } else {
    mostrarError('Rol no reconocido. Contacta al administrador.')
  }
}

function mostrarError(msg) {
  const box = document.getElementById('error-box')
  box.textContent = msg
  box.style.display = 'block'
  document.getElementById('loading-box').style.display = 'none'
  document.getElementById('login-btn').disabled = false
}

// Enter para hacer login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') window.doLogin()
})

// Verificar sesión al cargar
checkSession()
</script>
</body>
</html>
