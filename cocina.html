<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Food 58 — Cocina</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#060a0f;font-family:system-ui,sans-serif;color:#e2e8f0;min-height:100vh;}
/* LOGIN GUARD */
.auth-guard{position:fixed;inset:0;background:#060a0f;z-index:9999;display:flex;align-items:center;justify-content:center;}
.auth-card{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:14px;padding:28px 24px;width:100%;max-width:320px;text-align:center;}
.auth-logo{width:56px;height:56px;background:#CC0000;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;margin:0 auto 14px;}
.auth-title{font-size:16px;font-weight:700;color:#e2e8f0;margin-bottom:4px;}
.auth-sub{font-size:12px;color:#555;margin-bottom:20px;}
.auth-inp{width:100%;background:#111;border:1px solid #2a2a2a;border-radius:8px;padding:10px 12px;font-size:13px;color:#e2e8f0;outline:none;margin-bottom:10px;font-family:inherit;}
.auth-inp:focus{border-color:#CC0000;}
.auth-inp::placeholder{color:#444;}
.auth-btn{width:100%;background:#CC0000;color:#fff;font-size:14px;font-weight:700;padding:12px;border-radius:9px;border:none;cursor:pointer;}
.auth-err{background:#1a0000;border:1px solid #660000;border-radius:7px;padding:8px 12px;font-size:12px;color:#f87171;margin-bottom:10px;display:none;}
/* COCINA */
.header{background:#0a0e14;border-bottom:1px solid #1e2d3d;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;}
.h-left{display:flex;align-items:center;gap:10px;}
.logo-sq{width:32px;height:32px;background:#CC0000;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;}
.h-title{font-size:14px;font-weight:700;color:#e2e8f0;}
.h-sub{font-size:10px;color:#555;}
.h-clock{font-size:22px;font-weight:700;color:#CC0000;font-variant-numeric:tabular-nums;}
.logout-btn{background:rgba(204,0,0,.2);border:0.5px solid #CC0000;color:#CC0000;font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px;}
.stat{background:#111820;border:1px solid #1e2d3d;border-radius:8px;padding:10px;text-align:center;}
.stat-val{font-size:24px;font-weight:700;}
.stat-lbl{font-size:10px;color:#555;margin-top:2px;}
.alerta{background:#1a0505;border:1px solid #f87171;border-radius:8px;margin:0 12px 10px;padding:10px 14px;font-size:13px;font-weight:600;color:#f87171;display:none;}
.empty{text-align:center;padding:60px;color:#333;font-size:14px;}
.comandas{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 16px;}
.comanda{border-radius:12px;padding:14px;border:2px solid;}
.c-urgente{background:#1a0505;border-color:#f87171;}
.c-warn{background:#1a1500;border-color:#FFD700;}
.c-ok{background:#051a0a;border-color:#34d399;}
.c-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.08);}
.c-num{font-size:14px;font-weight:700;color:#e2e8f0;}
.c-mesa{font-size:11px;color:#555;margin-top:2px;}
.c-timer-wrap{text-align:right;}
.c-timer{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;}
.c-timer-lbl{font-size:10px;color:#555;}
.t-ok{color:#34d399;}.t-warn{color:#FFD700;}.t-late{color:#f87171;}
.c-nota{font-size:12px;color:#fb923c;background:rgba(251,146,60,.1);padding:6px 8px;border-radius:6px;margin-bottom:8px;}
.c-items{margin-bottom:10px;}
.c-item{font-size:14px;color:#94a3b8;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:8px;}
.c-item:last-child{border-bottom:none;}
.c-qty{font-size:14px;font-weight:700;color:#CC0000;min-width:24px;}
.c-actions{display:flex;flex-direction:column;gap:6px;}
.c-btn{width:100%;padding:10px;border-radius:8px;font-size:13px;font-weight:700;border:none;cursor:pointer;}
.btn-iniciar{background:#1e4060;color:#38bdf8;}
.btn-listo{background:#1D9E75;color:#fff;}
.btn-rechazar{background:transparent;color:#f87171;border:1px solid #f87171;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal{background:#1e1e1e;border-radius:14px;width:100%;max-width:320px;padding:20px;border:1px solid #333;}
.modal-title{font-size:15px;font-weight:700;color:#e2e8f0;margin-bottom:14px;}
.modal-select{width:100%;background:#111;border:1px solid #333;border-radius:7px;padding:9px 12px;font-size:13px;color:#e2e8f0;outline:none;margin-bottom:12px;}
.modal-btns{display:flex;gap:8px;}
.modal-ok{flex:1;background:#CC0000;color:#fff;font-size:13px;font-weight:700;padding:10px;border-radius:8px;border:none;cursor:pointer;}
.modal-cancel{background:#2a2a2a;color:#888;font-size:13px;padding:10px 14px;border-radius:8px;border:none;cursor:pointer;}
</style>
</head>
<body>

<!-- AUTH GUARD -->
<div class="auth-guard" id="auth-guard">
  <div class="auth-card">
    <div class="auth-logo">5/8</div>
    <div class="auth-title">Acceso Cocina</div>
    <div class="auth-sub">Fast Food 58 · Ingresa con tu cuenta</div>
    <div class="auth-err" id="auth-err"></div>
    <input class="auth-inp" type="email" id="auth-email" placeholder="correo@fastfood58.com">
    <input class="auth-inp" type="password" id="auth-pass" placeholder="Contraseña">
    <button class="auth-btn" onclick="doLogin()">Ingresar →</button>
  </div>
</div>

<div id="app-content" style="display:none;">
  <div class="header">
    <div class="h-left">
      <div class="logo-sq">5/8</div>
      <div><div class="h-title">🍳 Cocina · Fast Food 58</div><div class="h-sub" id="user-sub">Cargando...</div></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="h-clock" id="clk">--:--:--</div>
      <button class="logout-btn" onclick="cerrarSesion()">Salir</button>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-val" style="color:#f87171" id="cnt-urgente">0</div><div class="stat-lbl">Urgentes</div></div>
    <div class="stat"><div class="stat-val" style="color:#FFD700" id="cnt-cocina">0</div><div class="stat-lbl">Preparando</div></div>
    <div class="stat"><div class="stat-val" style="color:#34d399" id="cnt-ok">0</div><div class="stat-lbl">Nuevos</div></div>
    <div class="stat"><div class="stat-val" style="color:#555" id="cnt-total">0</div><div class="stat-lbl">Entregados hoy</div></div>
  </div>
  <div class="alerta" id="alerta"></div>
  <div class="comandas" id="comandas-grid"></div>
</div>

<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-title">Cambiar estado · <span id="modal-num"></span></div>
    <select class="modal-select" id="modal-estado">
      <option value="espera">En espera</option>
      <option value="cocina">En cocina / Preparando</option>
      <option value="listo">Listo para entregar</option>
      <option value="cancelado">Rechazar / Cancelar</option>
    </select>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="modal-ok" onclick="guardarEstado()">Confirmar</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
const supabase = createClient(
  'https://svftrsehuwkfmtdvzgek.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN2ZnRyc2VodXdrZm10ZHZ6Z2VrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMDg4MTIsImV4cCI6MjA5Mjg4NDgxMn0.PtKpXTQkWPwyk6BSVSq8HiJqgQ1qNITOIT2oNI8_oSI'
)

let pedidos=[], editId=null

setInterval(()=>{
  const el=document.getElementById('clk')
  if(el) el.textContent=new Date().toLocaleTimeString('es-PE')
},1000)

// VERIFICAR SESIÓN AL CARGAR
async function init(){
  const{data:{session}}=await supabase.auth.getSession()
  if(session){
    await verificarRol(session.user.email)
  }
}

async function verificarRol(email){
  const{data:usuario}=await supabase.from('usuarios').select('rol,nombre,activo').eq('email',email).single()
  if(!usuario||!usuario.activo){await supabase.auth.signOut();return}
  if(usuario.rol==='admin'){window.location.href='/admin.html';return}
  if(usuario.rol==='mozo'){window.location.href='/mozo.html';return}
  // Es cocina — mostrar app
  document.getElementById('auth-guard').style.display='none'
  document.getElementById('app-content').style.display='block'
  document.getElementById('user-sub').textContent='Chef: '+usuario.nombre
  localStorage.setItem('ff58_rol',usuario.rol)
  localStorage.setItem('ff58_nombre',usuario.nombre)
  iniciarApp()
}

window.doLogin=async()=>{
  const email=document.getElementById('auth-email').value.trim()
  const pass=document.getElementById('auth-pass').value.trim()
  const errEl=document.getElementById('auth-err')
  if(!email||!pass){errEl.textContent='Completa todos los campos.';errEl.style.display='block';return}
  errEl.style.display='none'
  const{data,error}=await supabase.auth.signInWithPassword({email,password:pass})
  if(error){errEl.textContent='Correo o contraseña incorrectos.';errEl.style.display='block';return}
  await verificarRol(email)
}

function iniciarApp(){
  cargar()
  supabase.channel('cocina-realtime').on('postgres_changes',{event:'*',schema:'public',table:'pedidos'},cargar).subscribe()
  setInterval(render,1000)
}

function segs(t){return Math.floor((Date.now()-new Date(t).getTime())/1000)}
function fmt(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
function tcls(s){return s>=900?'t-late':s>=480?'t-warn':'t-ok'}
function ccls(s){return s>=900?'c-urgente':s>=480?'c-warn':'c-ok'}

async function cargar(){
  const{data}=await supabase.from('pedidos').select('*, pedido_items(*)').in('estado',['espera','cocina']).order('created_at',{ascending:true})
  pedidos=data||[]
  const hoy=new Date().toISOString().split('T')[0]
  const{count}=await supabase.from('pedidos').select('*',{count:'exact',head:true}).eq('estado','entregado').gte('created_at',hoy+'T00:00:00')
  document.getElementById('cnt-total').textContent=count||0
  render()
}

function render(){
  const urgentes=pedidos.filter(p=>segs(p.created_at)>=900).length
  const warn=pedidos.filter(p=>segs(p.created_at)>=480&&segs(p.created_at)<900).length
  const ok=pedidos.filter(p=>segs(p.created_at)<480).length
  document.getElementById('cnt-urgente').textContent=urgentes
  document.getElementById('cnt-cocina').textContent=warn
  document.getElementById('cnt-ok').textContent=ok
  if(urgentes>0){
    const ur=pedidos.find(p=>segs(p.created_at)>=900)
    document.getElementById('alerta').style.display='block'
    document.getElementById('alerta').textContent='🚨 Pedido #'+(ur.numero||'—')+' de '+(ur.mesa||'—')+' lleva más de 15 min — ¡PRIORIZAR!'
  }else{document.getElementById('alerta').style.display='none'}
  if(pedidos.length===0){document.getElementById('comandas-grid').innerHTML='<div class="empty" style="grid-column:1/-1;">✅ Sin comandas pendientes</div>';return}
  document.getElementById('comandas-grid').innerHTML=pedidos.map(p=>{
    const s=segs(p.created_at)
    return`<div class="comanda ${ccls(s)}">
      <div class="c-top">
        <div><div class="c-num">#${p.numero||'—'}</div><div class="c-mesa">${p.mesa||'—'} · ${p.cliente_nombre||'—'}</div>
        <div style="font-size:11px;margin-top:3px;color:${p.estado==='espera'?'#FFD700':'#818cf8'}">${p.estado==='espera'?'⏳ En espera':'🔥 Preparando'}</div></div>
        <div class="c-timer-wrap"><div class="c-timer ${tcls(s)}">${fmt(s)}</div><div class="c-timer-lbl">mm:ss</div></div>
      </div>
      ${p.nota?`<div class="c-nota">📝 ${p.nota}</div>`:''}
      <div class="c-items">${(p.pedido_items||[]).map(i=>`<div class="c-item"><span class="c-qty">${i.cantidad}x</span>${i.nombre}</div>`).join('')}</div>
      <div class="c-actions">
        ${p.estado==='espera'?`<button class="c-btn btn-iniciar" onclick="avanzar('${p.id}','cocina')">▶ Empezar a preparar</button>`:''}
        ${p.estado==='cocina'?`<button class="c-btn btn-listo" onclick="avanzar('${p.id}','listo')">✓ Marcar como LISTO</button>`:''}
        <button class="c-btn btn-rechazar" onclick="abrirModal('${p.id}','${p.numero||'—'}')">⚙ Cambiar / Rechazar</button>
      </div>
    </div>`
  }).join('')
}

window.avanzar=async(id,estado)=>{await supabase.from('pedidos').update({estado}).eq('id',id);await cargar()}
window.abrirModal=(id,num)=>{editId=id;document.getElementById('modal-num').textContent='#'+num;document.getElementById('modal').style.display='flex'}
window.cerrarModal=()=>{document.getElementById('modal').style.display='none';editId=null}
window.guardarEstado=async()=>{
  if(!editId)return
  await supabase.from('pedidos').update({estado:document.getElementById('modal-estado').value}).eq('id',editId)
  cerrarModal();await cargar()
}
window.cerrarSesion=async()=>{
  await supabase.auth.signOut()
  localStorage.removeItem('ff58_rol');localStorage.removeItem('ff58_nombre')
  location.reload()
}

document.addEventListener('keydown',e=>{if(e.key==='Enter')window.doLogin()})
init()
</script>
</body>
</html>
